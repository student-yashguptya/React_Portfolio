<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#CBD5E1" />
      <stop offset="100%" stop-color="#94A3B8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Futuristic Y -->
  <g filter="url(#glow)" opacity="0.3">
    <path d="M70 60 L128 128 L128 210" stroke="url(#logo-gradient)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M186 60 L128 128" stroke="url(#logo-gradient)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  <path d="M70 60 L128 128 L128 210" stroke="url(#logo-gradient)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M186 60 L128 128" stroke="url(#logo-gradient)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Futuristic G -->
  <g filter="url(#glow)" opacity="0.3">
     <path d="M140 145 L200 145 L200 180 A55 55 0 1 1 200 90" stroke="url(#logo-gradient)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  <path d="M140 145 L200 145 L200 180 A55 55 0 1 1 200 90" stroke="url(#logo-gradient)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
</svg>
