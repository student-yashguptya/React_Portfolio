<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="roomGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f43f5e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#be123c;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#roomGradient)"/>
  <g opacity="0.1">
    <circle cx="200" cy="150" r="90" fill="white"/>
    <circle cx="1000" cy="480" r="130" fill="white"/>
  </g>
  <!-- Room Cards -->
  <g transform="translate(600, 300)">
    <!-- Left card -->
    <rect x="-140" y="-60" width="100" height="120" fill="white" rx="8"/>
    <rect x="-140" y="-60" width="100" height="60" fill="rgba(255,255,255,0.3)" rx="8"/>
    <circle cx="-90" cy="-30" r="4" fill="white"/>
    <circle cx="-90" cy="-20" r="4" fill="white"/>
    <circle cx="-90" cy="-10" r="4" fill="white"/>
    <!-- Right card -->
    <rect x="40" y="-60" width="100" height="120" fill="white" rx="8"/>
    <rect x="40" y="-60" width="100" height="60" fill="rgba(255,255,255,0.3)" rx="8"/>
    <circle cx="90" cy="-30" r="4" fill="white"/>
    <circle cx="90" cy="-20" r="4" fill="white"/>
    <circle cx="90" cy="-10" r="4" fill="white"/>
    <!-- Location pin -->
    <path d="M 0 30 L -15 50 Q 0 70 15 50 Z" fill="white"/>
    <circle cx="0" cy="35" r="4" fill="rgba(244,63,94,1)"/>
  </g>
  <text x="600" y="550" font-size="32" font-weight="bold" fill="white" text-anchor="middle" font-family="Inter, sans-serif">AbhiRoom</text>
</svg>