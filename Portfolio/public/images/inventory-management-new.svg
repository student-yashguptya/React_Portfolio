<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="inventoryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#inventoryGradient)"/>
  <g opacity="0.1">
    <circle cx="200" cy="200" r="85" fill="white"/>
    <circle cx="1000" cy="400" r="125" fill="white"/>
  </g>
  <!-- Boxes/Stacks -->
  <g transform="translate(600, 300)">
    <!-- Stack 1 -->
    <rect x="-100" y="0" width="50" height="40" fill="white" stroke="rgba(255,255,255,0.5)" stroke-width="2" rx="2"/>
    <rect x="-100" y="-45" width="50" height="45" fill="white" stroke="rgba(255,255,255,0.5)" stroke-width="2" rx="2"/>
    <rect x="-100" y="-90" width="50" height="45" fill="white" opacity="0.8" stroke="rgba(255,255,255,0.5)" stroke-width="2" rx="2"/>
    <!-- Stack 2 -->
    <rect x="-30" y="-20" width="50" height="60" fill="white" stroke="rgba(255,255,255,0.5)" stroke-width="2" rx="2"/>
    <rect x="-30" y="-65" width="50" height="49" fill="white" stroke="rgba(255,255,255,0.5)" stroke-width="2" rx="2"/>
    <!-- Stack 3 -->
    <rect x="40" y="0" width="50" height="40" fill="white" stroke="rgba(255,255,255,0.5)" stroke-width="2" rx="2"/>
    <rect x="40" y="-50" width="50" height="50" fill="white" stroke="rgba(255,255,255,0.5)" stroke-width="2" rx="2"/>
    <!-- Checkmark -->
    <circle cx="120" cy="-40" r="30" fill="rgba(255,255,255,0.3)"/>
    <path d="M 110 -45 L 118 -37 L 135 -50" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="600" y="550" font-size="32" font-weight="bold" fill="white" text-anchor="middle" font-family="Inter, sans-serif">Inventory Management</text>
</svg>