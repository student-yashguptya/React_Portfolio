<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="healthGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#healthGradient)"/>
  <g opacity="0.1">
    <circle cx="200" cy="150" r="80" fill="white"/>
    <circle cx="1000" cy="450" r="120" fill="white"/>
  </g>
  <g transform="translate(600, 300)">
    <!-- Medical Cross -->
    <rect x="-40" y="-10" width="80" height="20" fill="white" rx="4"/>
    <rect x="-10" y="-40" width="20" height="80" fill="white" rx="4"/>
    <!-- Heart -->
    <path d="M -80,-20 Q -100,-40 -100,-50 Q -100,-70 -80,-70 Q -60,-70 -60,-50 L -60,-30 Q -60,-50 -40,-70 Q -20,-70 -20,-50 Q -20,-40 -40,-20" fill="white" opacity="0.6"/>
  </g>
  <text x="600" y="550" font-size="32" font-weight="bold" fill="white" text-anchor="middle" font-family="Inter, sans-serif">HealthcareX24</text>
</svg>