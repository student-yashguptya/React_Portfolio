<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hrGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#hrGradient)"/>
  <g opacity="0.1">
    <circle cx="150" cy="200" r="100" fill="white"/>
    <circle cx="1050" cy="400" r="140" fill="white"/>
  </g>
  <!-- Organization Chart -->
  <g transform="translate(600, 300)">
    <!-- Top node -->
    <rect x="-40" y="-120" width="80" height="50" fill="white" rx="4"/>
    <circle cx="-20" cy="-95" r="8" fill="white"/>
    <!-- Left branch -->
    <line x1="-60" y1="-70" x2="-100" y2="-30" stroke="white" stroke-width="3"/>
    <rect x="-130" y="-50" width="60" height="40" fill="white" rx="4"/>
    <!-- Right branch -->
    <line x1="60" y1="-70" x2="100" y2="-30" stroke="white" stroke-width="3"/>
    <rect x="70" y="-50" width="60" height="40" fill="white" rx="4"/>
    <!-- Bottom -->
    <line x1="-20" y1="-70" x2="-20" y2="20" stroke="white" stroke-width="3"/>
    <rect x="-50" y="20" width="100" height="40" fill="white" rx="4"/>
  </g>
  <text x="600" y="550" font-size="32" font-weight="bold" fill="white" text-anchor="middle" font-family="Inter, sans-serif">Katalyx HR ERP</text>
</svg>